<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/live-interview.css">
    <link rel="stylesheet" href="/static/css/markdown-styles.css">
    <link rel="stylesheet" href="/static/css/hotkeys.css">
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
</head>
<body>

    <!-- Stage 1: Onboarding -->
    <div id="onboarding-view" class="view active">
        <div class="container">
            <h1>Aura Onboarding</h1>
            <p class="subtitle">First, let's gather some context for the AI.</p>
            
            <div class="onboarding-grid">
                <fieldset class="grid-span-1">
                    <legend>Your Profile</legend>
                    <input type="text" id="user-name" placeholder="Your Name" required>
                    <input type="text" id="user-company" placeholder="Company You're Interviewing With" required>
                    <input type="text" id="user-role" placeholder="Target Role" required>
                    <textarea id="user-resume" placeholder="Paste your resume text here..." required></textarea>
                </fieldset>
    
                <fieldset class="grid-span-1">
                    <legend>Interview Focus</legend>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="focus" value="behavioral"> Behavioral</label>
                        <label><input type="checkbox" name="focus" value="system-design"> System Design</label>
                        <label><input type="checkbox" name="focus" value="dsa"> Data Structures & Algorithms</label>
                        <label><input type="checkbox" name="focus" value="coding"> Coding</label>
                        <label><input type="checkbox" name="focus" value="cultural-fit"> Cultural Fit</label>
                        <label><input type="checkbox" name="focus" value="hr"> HR / Screening</label>
                    </div>
                </fieldset>
            </div>

            <fieldset>
                <legend>AI Configuration</legend>
                <div class="ai-config-group">
                    <select id="ai-provider-select" required>
                        <option value="">Select AI Provider</option>
                    </select>
                    <select id="ai-model-select" disabled required>
                        <option value="">Select Model</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Job Description / Requirements</legend>
                <textarea id="user-objectives" placeholder="Paste the job description or key requirements here to give the AI context."></textarea>
            </fieldset>

            <button id="proceed-to-checks">Proceed to Device Setup</button>
        </div>
    </div>

    <!-- Stage 2: Pre-Flight Check -->
    <div id="preflight-view" class="view">
        <div class="container">
            <h1>Aura Pre-Flight Check</h1>
            <div id="checks">
                <div class="check-item" id="check-mic-permission"><span class="indicator">⚪</span> Microphone Permission</div>
                <div class="check-item" id="check-mic-selection"><span class="indicator">⚪</span> Microphone Selection <select id="mic-select" disabled></select></div>
                <div class="check-item" id="check-backend"><span class="indicator">⚪</span> Backend Connection</div>
                <div class="check-item" id="check-deepgram"><span class="indicator">⚪</span> Deepgram API</div>
                <div class="check-item" id="check-ai-provider"><span class="indicator">⚪</span> AI Provider</div>
            </div>
            <div class="preflight-buttons">
                <button id="back-to-onboarding-btn">Back</button>
                <button id="start-interview-button" disabled>Start Interview</button>
            </div>
        </div>
    </div>

    <!-- Stage 3: Live Interview -->
    <div id="live-view" class="view">
        <div class="live-interview-container">
            <!-- Header -->
            <div class="live-header">
                <div class="live-status">
                    <div class="status-indicator recording"></div>
                    <span>Live Interview Session</span>
                </div>
                <div class="header-controls">
                    <button id="mute-btn" class="mute-btn" title="Mute microphone input to app (Alt+M)">
                        <span class="mute-icon">🎤</span>
                        <span class="mute-text">Mute</span>
                    </button>
                    <button id="end-interview-btn" class="end-btn">End Interview</button>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="interview-content">
                <div class="conversation-stream" id="conversation-stream">
                    <!-- Dynamic content will be added here -->
                </div>
            </div>

            <!-- Current Activity Indicator -->
            <div class="activity-indicator" id="activity-indicator">
                <div class="listening-state">
                    <div class="pulse"></div>
                    <span>Listening...</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/main.js"></script>

</body>
</html>
